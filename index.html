<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>냉장고 살림노트</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3ede1; --surface:#fffdf7; --surface-2:#f7f1e6;
    --ink:#26301f; --ink-soft:#5b6450; --line:#e4dccb;
    --primary:#2f5d3f; --primary-dark:#234731; --primary-soft:#e3eee4;
    --accent:#c5662b; --accent-soft:#f7e6d8;
    --ok:#3a8f54; --warn:#d79a17; --danger:#c0392b;
    --shadow:0 6px 22px rgba(40,50,30,.10);
    --shadow-sm:0 2px 8px rgba(40,50,30,.07);
    --r:18px; --r-sm:12px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,sans-serif;
    background:var(--bg);
    background-image:radial-gradient(circle at 12% 0%,#ece4d4 0%,transparent 45%),
                     radial-gradient(circle at 100% 100%,#e8e9dd 0%,transparent 40%);
    color:var(--ink); line-height:1.5; min-height:100vh;
    padding-bottom:40px;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 14px}

  /* header */
  header{position:sticky;top:0;z-index:30;backdrop-filter:blur(10px);
    background:rgba(243,237,225,.86);border-bottom:1px solid var(--line)}
  .head-in{max-width:560px;margin:0 auto;padding:14px 14px 10px;display:flex;align-items:center;gap:10px}
  .logo{width:38px;height:38px;border-radius:11px;background:var(--primary);
    display:grid;place-items:center;font-size:20px;box-shadow:var(--shadow-sm);flex:none}
  .ttl{font-family:'Gowun Dodum',sans-serif;font-size:19px;font-weight:400;letter-spacing:-.01em}
  .ttl small{display:block;font-family:'Pretendard';font-size:11px;color:var(--ink-soft);font-weight:500;margin-top:1px}
  .head-tools{margin-left:auto;display:flex;gap:6px}
  .icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);
    background:var(--surface);font-size:17px;cursor:pointer;display:grid;place-items:center;color:var(--ink)}
  .icon-btn:active{transform:scale(.94)}

  /* action chips */
  .actions{display:flex;gap:8px;padding:12px 0 4px;overflow-x:auto;scrollbar-width:none}
  .actions::-webkit-scrollbar{display:none}
  .chip{flex:none;border:none;border-radius:999px;padding:10px 15px;font-size:13.5px;font-weight:600;
    cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit}
  .chip:active{transform:scale(.96)}
  .chip.p{background:var(--primary);color:#fff;box-shadow:var(--shadow-sm)}
  .chip.a{background:var(--accent);color:#fff}
  .chip.g{background:var(--surface);color:var(--ink);border:1px solid var(--line)}

  /* tabs */
  .tabs{display:flex;gap:6px;padding:10px 0 6px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:none;border:1px solid var(--line);background:var(--surface);border-radius:999px;
    padding:7px 14px;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;font-family:inherit;white-space:nowrap}
  .tab.on{background:var(--primary-soft);color:var(--primary-dark);border-color:#c9ddca}
  .tab .n{font-size:11px;opacity:.7;margin-left:3px}

  .search{width:100%;border:1px solid var(--line);background:var(--surface);border-radius:12px;
    padding:11px 14px;font-size:14px;font-family:inherit;margin:6px 0 4px;color:var(--ink)}
  .search:focus{outline:none;border-color:var(--primary)}

  .sortbar{display:flex;justify-content:space-between;align-items:center;padding:6px 2px 10px;font-size:12.5px;color:var(--ink-soft)}
  .sortbar select{font-family:inherit;font-size:12.5px;border:1px solid var(--line);border-radius:8px;padding:4px 8px;background:var(--surface);color:var(--ink)}

  /* card — 박스형, 한 줄 2개 */
  #list{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:var(--shadow-sm);position:relative;overflow:hidden;display:flex;flex-direction:column}
  .card.selected{outline:3px solid var(--primary);outline-offset:-1px}
  .card .stripe{position:absolute;left:0;right:0;top:0;height:4px;z-index:2}
  .thumb-wrap{position:relative}
  .thumb{width:100%;height:92px;object-fit:cover;background:var(--surface-2);
    display:grid;place-items:center;font-size:34px;color:#bdb6a4}
  .badge-ov{position:absolute;top:8px;right:8px}
  .badge-ov .badge{box-shadow:0 1px 4px rgba(0,0,0,.18)}
  .sel-ov{position:absolute;top:8px;left:8px;width:24px;height:24px;border-radius:50%;
    border:2px solid #fff;background:rgba(20,30,15,.35);display:none;place-items:center;
    color:#fff;font-size:14px;font-weight:800;box-shadow:0 1px 4px rgba(0,0,0,.2)}
  .selectMode .sel-ov{display:grid}
  .sel-ov.on{background:var(--primary)}
  .c-body{flex:1;padding:9px 10px 10px}
  .c-name{font-size:14.5px;font-weight:700;letter-spacing:-.01em;word-break:keep-all;line-height:1.3}
  .badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;white-space:nowrap}
  .b-ok{background:#e7f3ea;color:var(--ok)} .b-warn{background:#fbf0d4;color:#a9760c}
  .b-danger{background:#f9e2de;color:var(--danger)} .b-staple{background:#e9eef6;color:#3d5a86}
  .c-meta{font-size:11.5px;color:var(--ink-soft);margin-top:4px;display:flex;flex-wrap:wrap;gap:3px 8px}
  .c-meta b{color:var(--ink);font-weight:700}
  .c-tags{margin-top:6px;display:flex;gap:5px;flex-wrap:wrap}
  .pill{font-size:10.5px;background:var(--surface-2);border:1px solid var(--line);border-radius:7px;padding:2px 6px;color:var(--ink-soft)}
  .c-act{display:flex;gap:5px;margin-top:9px}
  .mini{flex:1;font-size:11.5px;font-weight:600;border:1px solid var(--line);background:var(--surface-2);
    border-radius:8px;padding:6px 2px;cursor:pointer;font-family:inherit;color:var(--ink);text-align:center}
  .mini:active{transform:scale(.95)}
  .mini.warnfill{background:var(--accent-soft);border-color:#eccdb3;color:var(--accent)}

  .empty{text-align:center;padding:54px 20px;color:var(--ink-soft)}
  .empty .em{font-size:46px;display:block;margin-bottom:10px;opacity:.5}

  /* modal */
  .ov{position:fixed;inset:0;background:rgba(30,35,22,.42);z-index:50;display:none;
    align-items:flex-end;justify-content:center}
  .ov.show{display:flex}
  .sheet{background:var(--surface);width:100%;max-width:560px;border-radius:22px 22px 0 0;
    max-height:92vh;overflow:auto;padding:6px 18px 28px;animation:up .25s ease}
  @keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .grab{width:40px;height:4px;background:var(--line);border-radius:9px;margin:10px auto 14px}
  .sheet h2{font-family:'Gowun Dodum';font-weight:400;font-size:20px;margin:2px 0 16px}
  label.f{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin:12px 0 5px}
  input,select,textarea{width:100%;font-family:inherit;font-size:14.5px;border:1px solid var(--line);
    border-radius:11px;padding:11px 12px;background:var(--surface-2);color:var(--ink)}
  input:focus,select,textarea:focus{outline:none;border-color:var(--primary)}
  textarea{resize:vertical;min-height:54px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .row3{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:8px}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1;min-width:74px;border:1px solid var(--line);background:var(--surface-2);
    border-radius:10px;padding:9px 4px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink-soft)}
  .seg button.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .toggle{display:flex;align-items:center;gap:9px;margin-top:14px;padding:11px 13px;background:var(--surface-2);border-radius:11px;border:1px solid var(--line)}
  .toggle input{width:auto}
  .toggle div{font-size:13px}.toggle small{color:var(--ink-soft);font-size:11.5px}
  .photo-zone{margin-top:6px;border:1.5px dashed var(--line);border-radius:13px;padding:14px;text-align:center;
    color:var(--ink-soft);font-size:13px;cursor:pointer;background:var(--surface-2)}
  .photo-zone img{max-width:100%;max-height:160px;border-radius:10px;margin-top:8px}
  .save{width:100%;margin-top:20px;background:var(--primary);color:#fff;border:none;border-radius:13px;
    padding:15px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  .save:active{transform:scale(.99)}
  .ghost{width:100%;margin-top:9px;background:none;border:1px solid var(--line);border-radius:13px;
    padding:12px;font-size:13.5px;cursor:pointer;font-family:inherit;color:var(--ink-soft)}
  .hint{font-size:11.5px;color:var(--ink-soft);margin-top:5px}

  /* recipe / list rows */
  .rec{background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:11px}
  .rec h3{margin:0 0 4px;font-size:16px;letter-spacing:-.01em}
  .rec .why{font-size:12.5px;color:var(--accent);font-weight:600;margin-bottom:9px}
  .rec .lbl{font-size:11.5px;font-weight:700;color:var(--ink-soft);margin:8px 0 3px}
  .rec ol{margin:5px 0 0;padding-left:18px;font-size:13px}.rec ol li{margin-bottom:4px}
  .rec .have b{color:var(--ok)} .rec .need b{color:var(--accent)}
  .noteline{font-size:12px;background:var(--accent-soft);border:1px solid #eccdb3;color:#9a4f1f;
    border-radius:10px;padding:9px 11px;margin-bottom:12px}
  .splist .li{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line)}
  .splist .li input[type=checkbox]{width:20px;height:20px}
  .splist .li.done span{text-decoration:line-through;color:var(--ink-soft)}
  .splist .li span{flex:1;font-size:14px}
  .splist .li button{border:none;background:none;color:var(--danger);font-size:13px;cursor:pointer}
  .addrow{display:flex;gap:8px;margin-top:12px}
  .loading{text-align:center;padding:30px;color:var(--ink-soft)}
  .spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--primary);
    border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .stat{display:flex;gap:10px;margin-bottom:14px}
  .stat .b{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
  .stat .b b{display:block;font-size:22px;color:var(--primary)} .stat .b small{font-size:11px;color:var(--ink-soft)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:11px 18px;border-radius:999px;font-size:13px;z-index:99;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;bottom:34px}

  /* --- v2: 박스 그리드/선택/상세레시피 --- */
  .empty{grid-column:1/-1}
  .selbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:560px;z-index:45;
    display:none;gap:10px;padding:12px 14px calc(14px + env(safe-area-inset-bottom));
    background:rgba(255,253,247,.97);backdrop-filter:blur(8px);border-top:1px solid var(--line);align-items:center}
  .selbar.show{display:flex}
  .selbar .chip{flex:1;justify-content:center;padding:13px}
  .ghost-sm{border:1px solid var(--line);background:var(--surface);border-radius:999px;
    padding:12px 18px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;color:var(--ink-soft);flex:none}
  body.selecting{padding-bottom:96px}
  .rec-meta{display:flex;gap:7px;flex-wrap:wrap;margin:2px 0 9px}
  .rec-meta span{font-size:11.5px;font-weight:600;background:var(--surface);border:1px solid var(--line);
    border-radius:8px;padding:3px 9px;color:var(--ink-soft)}
  .rec .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
  .rec .chips .c{font-size:12px;border-radius:8px;padding:3px 9px;border:1px solid}
  .rec .chips .c.h{background:#e7f3ea;border-color:#c4e2cc;color:#2c6b41}
  .rec .chips .c.n{background:var(--accent-soft);border-color:#eccdb3;color:#9a4f1f}
  .rec .tip{margin-top:10px;font-size:12.5px;background:#fff8e8;border:1px solid #f0e0b0;
    color:#85610c;border-radius:10px;padding:9px 11px;line-height:1.5}
  .rec ol li{margin-bottom:6px;line-height:1.55}
</style>
</head>
<body>

<header>
  <div class="head-in">
    <div class="logo">🥬</div>
    <div class="ttl">냉장고 살림노트<small>냉파부터 레시피 추천까지</small></div>
    <div class="head-tools">
      <button class="icon-btn" onclick="openBackup()" title="백업/복원">⚙️</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="actions">
    <button class="chip p" onclick="openAdd()">＋ 재료 추가</button>
    <button class="chip a" onclick="openRecipe()">🍳 오늘 뭐먹지</button>
    <button class="chip g" onclick="toggleSelectMode()">✅ 골라서 추천</button>
    <button class="chip g" onclick="openShopping()">🛒 장보기</button>
    <button class="chip g" onclick="openWaste()">🗑️ 버린 기록</button>
  </div>

  <div class="tabs" id="tabs"></div>
  <input class="search" id="search" placeholder="🔍 재료 이름 검색" oninput="render()">
  <div class="sortbar">
    <select id="catFilter" onchange="render()"></select>
    <span>정렬
      <select id="sort" onchange="render()">
        <option value="expiry">유통기한 임박순</option>
        <option value="recent">최근 등록순</option>
        <option value="name">이름순</option>
      </select>
    </span>
  </div>
  <div id="countTxt" style="font-size:11.5px;color:var(--ink-soft);padding:0 2px 8px">—</div>

  <div id="list"></div>
</div>

<div class="selbar" id="selbar">
  <button class="ghost-sm" onclick="exitSelect()">취소</button>
  <button class="chip a" onclick="recommendSelected()">🍳 <span id="selCount">0</span>개 재료로 레시피</button>
</div>

<!-- 재료 추가/수정 -->
<div class="ov" id="ovAdd"><div class="sheet">
  <div class="grab"></div>
  <h2 id="addTtl">재료 추가</h2>
  <input type="hidden" id="editId">
  <label class="f">재료 이름</label>
  <input id="fName" placeholder="예) 두부, 다진마늘, 비비고 만두" oninput="autoExpiry()">

  <label class="f">분류</label>
  <select id="fCat" onchange="autoExpiry()"></select>

  <label class="f">보관 위치</label>
  <div class="seg" id="fLoc"></div>

  <div class="row3" style="margin-top:6px">
    <div><label class="f">수량</label><input id="fQty" type="number" inputmode="decimal" value="1" min="0" step="0.5"></div>
    <div><label class="f">단위</label>
      <select id="fUnit">
        <option>개</option><option>봉</option><option>팩</option><option>g</option><option>kg</option>
        <option>ml</option><option>L</option><option>모</option><option>통</option><option>병</option>
      </select>
    </div>
    <div><label class="f">등록일</label><input id="fReg" type="date" onchange="autoExpiry()"></div>
  </div>

  <label class="f">유통기한 <span style="color:var(--accent)">자동 (보수적)</span> · 직접 수정 가능</label>
  <input id="fExp" type="date">
  <div class="hint" id="expHint"></div>

  <div class="toggle">
    <input type="checkbox" id="fStaple">
    <div>상시 보충 재료로 표시<small style="display:block">계란·우유·쌀처럼 계속 사는 것. 임박 알림에서 빠지고 날짜만 갱신해요.</small></div>
  </div>

  <label class="f">사진 (선택)</label>
  <div class="photo-zone" onclick="document.getElementById('fPhoto').click()">
    <span id="photoTxt">📷 탭해서 사진 첨부</span>
    <input type="file" id="fPhoto" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
    <div id="photoPrev"></div>
  </div>

  <label class="f">메모 (선택)</label>
  <textarea id="fMemo" placeholder="예) 반찬가게 멸치볶음 / 개봉함"></textarea>

  <button class="save" onclick="saveItem()">저장하기</button>
  <button class="ghost" id="delBtn" onclick="deleteCurrent()" style="display:none;color:var(--danger)">삭제</button>
  <button class="ghost" onclick="closeAll()">닫기</button>
</div></div>

<!-- 레시피 -->
<div class="ov" id="ovRecipe"><div class="sheet">
  <div class="grab"></div>
  <h2 id="recTtl">🍳 오늘 뭐먹지</h2>
  <div id="recBody"></div>
  <button class="ghost" onclick="closeAll()">닫기</button>
</div></div>

<!-- 장보기 -->
<div class="ov" id="ovShop"><div class="sheet">
  <div class="grab"></div>
  <h2>🛒 장보기 리스트</h2>
  <div id="shopAuto"></div>
  <div class="splist" id="shopList"></div>
  <div class="addrow">
    <input id="shopAdd" placeholder="직접 추가 (예: 계란 한 판)">
    <button class="chip p" onclick="addShop()">추가</button>
  </div>
  <button class="ghost" onclick="clearDoneShop()">완료 항목 비우기</button>
  <button class="ghost" onclick="closeAll()">닫기</button>
</div></div>

<!-- 버린 기록 -->
<div class="ov" id="ovWaste"><div class="sheet">
  <div class="grab"></div>
  <h2>🗑️ 버린 음식 기록</h2>
  <div class="stat" id="wasteStat"></div>
  <div class="splist" id="wasteList"></div>
  <button class="ghost" onclick="closeAll()">닫기</button>
</div></div>

<!-- 백업 -->
<div class="ov" id="ovBackup"><div class="sheet">
  <div class="grab"></div>
  <h2>⚙️ 백업 · 복원 · 설정</h2>
  <p class="hint" style="margin-bottom:14px">데이터는 이 브라우저에 저장돼요. 폰을 바꾸거나 안전하게 보관하려면 백업 파일을 받아두세요.</p>
  <button class="save" onclick="exportData()">📤 백업 파일 내려받기 (JSON)</button>
  <button class="ghost" onclick="document.getElementById('importFile').click()">📥 백업 파일에서 복원</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  <label class="f" style="margin-top:18px">AI 레시피 추천 상태</label>
  <div class="hint" id="apiStatus">확인 중…</div>
  <button class="ghost" onclick="closeAll()">닫기</button>
</div></div>

<div class="toast" id="toast"></div>

<script>
/* ============ 보관기간 표 (보수적, 일 단위) ============ */
const CATS = ["채소","과일","육류","해산물","유제품","달걀","두부/콩","반찬","밀키트","냉동식품","소스/양념","음료","곡물/면","빵/베이커리","기타"];
const LOCS = ["냉장실","냉동실","김치냉장고","실온"];

// 분류별 기본값 (보관위치별)
const CAT_DEFAULT = {
  "채소":{냉장실:7,냉동실:180,김치냉장고:10,실온:5},
  "과일":{냉장실:7,냉동실:180,김치냉장고:10,실온:5},

/* ============ 저장소 (IndexedDB, 실패 시 메모리 폴백) ============ */
let DB=null, MEM=false;
const memStore={items:[],shop:[],waste:[]};
function openDB(){return new Promise((res)=>{
  try{
    const r=indexedDB.open("fridgeNote",1);
    r.onupgradeneeded=e=>{const d=e.target.result;
      if(!d.objectStoreNames.contains("items"))d.createObjectStore("items",{keyPath:"id"});
      if(!d.objectStoreNames.contains("shop"))d.createObjectStore("shop",{keyPath:"id"});
      if(!d.objectStoreNames.contains("waste"))d.createObjectStore("waste",{keyPath:"id"});
    };
    r.onsuccess=e=>{DB=e.target.result;res()};
    r.onerror=()=>{MEM=true;res()};
  }catch(e){MEM=true;res();}
});}
function tx(store,mode){return DB.transaction(store,mode).objectStore(store);}
function allOf(store){
  if(MEM||!DB) return Promise.resolve(memStore[store].slice());
  return new Promise(res=>{const r=tx(store,"readonly").getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>res([])});
}
function putOf(store,v){
  if(MEM||!DB){const a=memStore[store];const i=a.findIndex(x=>x.id===v.id);if(i>=0)a[i]=v;else a.push(v);return Promise.resolve();}
  return new Promise(res=>{tx(store,"readwrite").put(v).onsuccess=res});
}
function delOf(store,id){
  if(MEM||!DB){memStore[store]=memStore[store].filter(x=>x.id!==id);return Promise.resolve();}
  return new Promise(res=>{tx(store,"readwrite").delete(id).onsuccess=res});
}
function clearOf(store){
  if(MEM||!DB){memStore[store]=[];return Promise.resolve();}
  return new Promise(res=>{tx(store,"readwrite").clear().onsuccess=res});
}

/* ============ 유통기한 계산 ============ */
function shelfDays(name,cat,loc){
  const n=(name||"").toLowerCase();
  let best=null,bestLen=0;
  for(const k in KW){ if(name && name.includes(k) && k.length>bestLen && KW[k][loc]!=null){best=KW[k][loc];bestLen=k.length;} }
  if(best!=null) return best;
  const d=CAT_DEFAULT[cat]||CAT_DEFAULT["기타"];
  return d[loc]!=null?d[loc]:7;
}
function calcExpiry(){
  const name=v("fName"),cat=v("fCat"),loc=curLoc(),reg=v("fReg")||todayStr();
  const days=shelfDays(name,cat,loc);
  const base=new Date(reg); base.setDate(base.getDate()+days);
  return {date:base.toISOString().slice(0,10),days};
}
function autoExpiry(){
  if(document.getElementById("editId").dataset.locked==="1") {} // 사용자가 수동 변경 시 잠금
  const {date,days}=calcExpiry();
  document.getElementById("fExp").value=date;
  document.getElementById("expHint").textContent=
    days===0?"이 분류·위치는 자동 계산이 어려워요. 직접 입력해 주세요."
    :`자동 +${days}일 (보수적 기준). 실제 표기일이 있으면 직접 바꿔주세요.`;
}
function dday(item){
  if(item.staple) return null;
  const t=new Date(todayStr()), e=new Date(item.expiry);
  return Math.round((e-t)/86400000);
}

function v(id){return document.getElementById(id).value;}
function curLoc(){const on=document.querySelector("#fLoc .on");return on?on.dataset.v:"냉장실";}

function buildTabs(){
  const counts={전체:STATE.items.length};
  LOCS.forEach(l=>counts[l]=STATE.items.filter(i=>i.loc===l).length);
  const order=["전체",...LOCS];
  document.getElementById("tabs").innerHTML=order.map(t=>
    `<button class="tab ${STATE.tab===t?'on':''}" onclick="STATE.tab='${t}';buildTabs();render()">${t}<span class="n">${counts[t]||0}</span></button>`
  ).join("");
}

function buildCatFilter(){
  document.getElementById("catFilter").innerHTML =
    `<option value="">전체 분류</option>`+CATS.map(c=>`<option>${c}</option>`).join("");
}

function render(){
  const q=v("search").trim();
  const cat=v("catFilter");
  let list=STATE.items.slice();
  if(STATE.tab!=="전체") list=list.filter(i=>i.loc===STATE.tab);
  if(cat) list=list.filter(i=>i.cat===cat);
  if(q) list=list.filter(i=>i.name.includes(q)||(i.memo||"").includes(q)||i.cat.includes(q));
  const sort=v("sort");
  list.sort((a,b)=>{
    if(sort==="name") return a.name.localeCompare(b.name,"ko");
    if(sort==="recent") return b.reg.localeCompare(a.reg);
    // expiry: staple 맨 뒤, 임박 먼저
    const da=dday(a), db=dday(b);
    if(da===null&&db===null) return a.name.localeCompare(b.name,"ko");
    if(da===null) return 1; if(db===null) return -1;
    return da-db;
  });
  document.getElementById("countTxt").textContent=`${list.length}개 항목`;
  const el=document.getElementById("list");
  if(!list.length){el.innerHTML=`<div class="empty"><span class="em">🧊</span>아직 등록한 재료가 없어요.<br>＋ 재료 추가로 시작해보세요!</div>`;return;}
  el.innerHTML=list.map(cardHTML).join("");
}

function cardHTML(i){
  const d=dday(i);
  let badge,stripe;
  if(i.staple){badge=`<span class="badge b-staple">상시보충</span>`;stripe="#3d5a86";}
  else if(d<0){badge=`<span class="badge b-danger">${-d}일 지남</span>`;stripe="var(--danger)";}
  else if(d<=2){badge=`<span class="badge b-danger">D-${d}</span>`;stripe="var(--danger)";}
  else if(d<=5){badge=`<span class="badge b-warn">D-${d}</span>`;stripe="var(--warn)";}
  else{badge=`<span class="badge b-ok">D-${d}</span>`;stripe="var(--ok)";}
  const selected=STATE.selected.has(i.id);
  const thumb=i.photo?`<img class="thumb" src="${i.photo}">`:`<div class="thumb">${emojiFor(i.cat)}</div>`;
  const stapleBtn=i.staple?`<button class="mini warnfill" onclick="restock('${i.id}')">🔄 보충</button>`:"";
  const actions=STATE.selectMode?"":`<div class="c-act">
        ${stapleBtn}
        <button class="mini" onclick="openEdit('${i.id}')">수정</button>
        ${i.staple?"":`<button class="mini" onclick="useItem('${i.id}')">다 씀</button>
        <button class="mini" onclick="discardItem('${i.id}')">버림</button>`}
      </div>`;
  return `<div class="card ${selected?'selected':''}" onclick="cardClick('${i.id}')">
    <div class="stripe" style="background:${stripe}"></div>
    <div class="thumb-wrap">
      ${thumb}
      <div class="badge-ov">${badge}</div>
      <div class="sel-ov ${selected?'on':''}">${selected?'✓':''}</div>
    </div>
    <div class="c-body">
      <div class="c-name">${esc(i.name)}</div>
      <div class="c-meta"><span><b>${i.qty}</b>${i.unit}</span><span>📍${i.loc}</span></div>
      <div class="c-meta">유통 ${i.staple?'—':i.expiry}</div>
      ${i.memo?`<div class="c-tags"><span class="pill">📝 ${esc(i.memo)}</span></div>`:""}
      ${actions}
    </div></div>`;
}

async function restock(id){

  await putOf("items",i);STATE.items=await allOf("items");render();toast(`${i.name} 보충일 갱신 ✓`);
}

/* ============ 사진 압축 ============ */
function handlePhoto(e){
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{const img=new Image();img.onload=()=>{
    const max=900;let{width:w,height:h}=img;
    if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
    const c=document.createElement("canvas");c.width=w;c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    STATE.photoData=c.toDataURL("image/jpeg",0.7);
    document.getElementById("photoPrev").innerHTML=`<img src="${STATE.photoData}">`;
    document.getElementById("photoTxt").textContent="📷 사진 변경";
  };img.src=rd.result;};
  rd.readAsDataURL(f);
}

async function openRecipe(selectedNames){
  closeAll();show("ovRecipe");
  const body=document.getElementById("recBody");
  const useSel=Array.isArray(selectedNames)&&selectedNames.length>0;
  const pool=useSel?STATE.items.filter(i=>selectedNames.includes(i.name)):STATE.items;
  const all=useSel?selectedNames:STATE.items.map(i=>i.name);
  const expiring=pool.filter(i=>{const d=dday(i);return d!==null&&d<=3;})
    .sort((a,b)=>dday(a)-dday(b)).map(i=>`${i.name}(D-${Math.max(dday(i),0)})`);
  document.getElementById("recTtl").textContent=useSel?"🍳 선택한 재료로 추천":"🍳 오늘 뭐먹지";
  if(!all.length){body.innerHTML=`<div class="empty"><span class="em">🍳</span>재료를 먼저 등록해 주세요!</div>`;return;}
  body.innerHTML=`<div class="loading"><div class="spin"></div>${useSel?'고른 재료로':'임박 재료 우선으로'} 상세 레시피 만드는 중…</div>`;
  try{
    const r=await fetch("/.netlify/functions/recommend",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ingredients:all,expiring,mode:useSel?"selected":"all"})});
    if(!r.ok) throw new Error("fn");
    const data=await r.json();
    if(!data.recipes||!data.recipes.length) throw new Error("empty");
    renderRecipes(data.recipes,expiring,false,useSel);
  }catch(err){
    renderRecipes(localRecipes(all,expiring),expiring,true,useSel);
  }
}
function renderRecipes(recipes,expiring,isLocal,useSel){
  const body=document.getElementById("recBody");
  const nm=x=>esc(typeof x==='string'?x:(x&&x.name)||'');
  let head="";
  if(useSel) head+=`<div class="noteline">✅ 고른 재료 위주로 추천했어요</div>`;
  else if(expiring.length) head+=`<div class="noteline">⏰ 임박 재료 우선 추천: ${esc(expiring.join(", "))}</div>`;
  if(isLocal) head+=`<div class="noteline">ℹ️ AI 연결 전(또는 미배포)이라 내장 레시피로 추천했어요. Netlify 배포 후 키를 넣으면 더 상세해져요.</div>`;
  body.innerHTML=head+recipes.map(rc=>{
    const meta=[];
    if(rc.time)meta.push(`⏱ ${esc(rc.time)}`);
    if(rc.servings)meta.push(`👥 ${esc(rc.servings)}`);
    if(rc.difficulty)meta.push(`🔥 ${esc(rc.difficulty)}`);
    const have=(rc.have||[]).map(x=>`<span class="c h">${nm(x)}</span>`).join("");
    const need=(rc.need||[]).map(x=>`<span class="c n">${nm(x)}</span>`).join("");
    const steps=(rc.steps||[]).map(s=>`<li>${esc(s)}</li>`).join("");
    return `<div class="rec">
      <h3>${esc(rc.name)}</h3>
      ${meta.length?`<div class="rec-meta">${meta.map(m=>`<span>${m}</span>`).join("")}</div>`:""}
      ${rc.reason?`<div class="why">👍 ${esc(rc.reason)}</div>`:""}
      ${have?`<div class="lbl">집에 있는 재료</div><div class="chips">${have}</div>`:""}
      ${need?`<div class="lbl">사야 할 재료</div><div class="chips">${need}</div>`:""}
      ${steps?`<div class="lbl">만드는 법</div><ol>${steps}</ol>`:""}
      ${rc.tip?`<div class="tip">💡 ${esc(rc.tip)}</div>`:""}
    </div>`;
  }).join("");
}

function localRecipes(have,expiring){
  const expNames=expiring.map(x=>x.split("(")[0]);
  const scored=RDB.map(r=>{
    const matchHave=r.tags.filter(t=>have.some(h=>h.includes(t)));
    const usesExp=r.tags.some(t=>expNames.some(e=>e.includes(t)));
    return {r,score:matchHave.length+(usesExp?3:0),matchHave};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,3);
  return scored.map(x=>({
    name:x.r.name,
    reason:x.matchHave.length>=2?`집에 있는 ${x.matchHave.slice(0,2).join("·")}로 바로 가능`:"",
    have:x.matchHave,
    need:(x.r.need||[]).filter(n=>!have.some(h=>h.includes(n))),
    steps:x.r.steps
  }));
}

async function openShopping(){
  closeAll();show("ovShop");
  // 자동 추천: 임박/지난 재료 + 다 쓴 상시품
  const expiring=STATE.items.filter(i=>{const d=dday(i);return d!==null&&d<=2;}).map(i=>i.name);
  const sugg=[...new Set(expiring)].filter(n=>!STATE.shop.some(s=>s.name===n));
  document.getElementById("shopAuto").innerHTML = sugg.length?
    `<div class="lbl" style="font-size:12px;color:var(--ink-soft);font-weight:600;margin-bottom:6px">⏰ 임박/소진 추천 (탭하면 추가)</div>`+
    sugg.map(n=>`<button class="mini" style="margin:0 5px 6px 0" onclick="addShopName('${esc(n)}')">＋ ${esc(n)}</button>`).join(""):"";
  renderShop();
}
function renderShop(){
  const el=document.getElementById("shopList");
  if(!STATE.shop.length){el.innerHTML=`<div class="hint" style="padding:12px 0">목록이 비어 있어요.</div>`;return;}
  el.innerHTML=STATE.shop.map(s=>`<div class="li ${s.done?'done':''}">
    <input type="checkbox" ${s.done?'checked':''} onchange="toggleShop('${s.id}')">
    <span>${esc(s.name)}</span>
    <button onclick="delShop('${s.id}')">삭제</button></div>`).join("");
}
async function addShop(){const n=document.getElementById("shopAdd").value.trim();if(!n)return;
  await addShopName(n);document.getElementById("shopAdd").value="";}
async function addShopName(n){await putOf("shop",{id:uid(),name:n,done:false});STATE.shop=await allOf("shop");openShopping();}
async function toggleShop(id){const s=STATE.shop.find(x=>x.id===id);s.done=!s.done;await putOf("shop",s);STATE.shop=await allOf("shop");renderShop();}
async function delShop(id){await delOf("shop",id);STATE.shop=await allOf("shop");renderShop();}
async function clearDoneShop(){for(const s of STATE.shop.filter(x=>x.done))await delOf("shop",s.id);STATE.shop=await allOf("shop");renderShop();toast("완료 항목 비웠어요");}

/* ============ 버린 기록 ============ */
async function openWaste(){
  closeAll();show("ovWaste");STATE.waste=await allOf("waste");
  const m=todayStr().slice(0,7);
  const thisMonth=STATE.waste.filter(w=>w.date.startsWith(m)).length;
  const byCat={};STATE.waste.forEach(w=>byCat[w.cat]=(byCat[w.cat]||0)+1);
  const top=Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById("wasteStat").innerHTML=
    `<div class="b"><b>${thisMonth}</b><small>이번 달 버림</small></div>
     <div class="b"><b>${STATE.waste.length}</b><small>전체 누적</small></div>
     <div class="b"><b>${top?top[0]:'-'}</b><small>가장 많이 버린 분류</small></div>`;
  const el=document.getElementById("wasteList");
  if(!STATE.waste.length){el.innerHTML=`<div class="hint" style="padding:12px 0">아직 기록이 없어요. 잘 드시고 계시네요 👍</div>`;return;}
  el.innerHTML=STATE.waste.slice().reverse().map(w=>`<div class="li">
    <span>${esc(w.name)} <span class="pill">${w.cat}</span></span>
    <span class="hint">${w.date}</span>
    <button onclick="delWaste('${w.id}')">삭제</button></div>`).join("");
}
async function delWaste(id){await delOf("waste",id);openWaste();}

/* ============ 백업 ============ */
async function exportData(){
  const data={items:await allOf("items"),shop:await allOf("shop"),waste:await allOf("waste"),exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`냉장고백업_${todayStr()}.json`;a.click();toast("백업 파일을 내려받았어요 ✓");
}
async function importData(e){
  const f=e.target.files[0];if(!f)return;
  if(!confirm("현재 데이터를 덮어쓰고 복원할까요?"))return;
  const txt=await f.text();const data=JSON.parse(txt);
  await clearOf("items");await clearOf("shop");await clearOf("waste");
  for(const i of(data.items||[]))await putOf("items",i);
  for(const s of(data.shop||[]))await putOf("shop",s);
  for(const w of(data.waste||[]))await putOf("waste",w);
  STATE.items=await allOf("items");STATE.shop=await allOf("shop");STATE.waste=await allOf("waste");
  closeAll();buildTabs();render();toast("복원 완료 ✓");
}
